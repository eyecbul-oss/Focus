name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/native-reminders-release
      - feature/study-tracking-upgrades

permissions:
  contents: write

env:
  APP_VERSION: 2.3.0-dev
  APK_NAME: SezR-Focus-2.3.0-dev-debug.apk

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Configure Android build flags
        run: |
          printf 'android.useAndroidX=true\nandroid.suppressUnsupportedCompileSdk=35\n' > gradle.properties

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${APK_NAME}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SezR-Focus-${{ env.APP_VERSION }}-debug
          path: android/app/build/outputs/apk/debug/${{ env.APK_NAME }}

      - name: Publish APK file
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sezr-focus-apk
          name: SezR Focus APK ${{ env.APP_VERSION }}
          files: android/app/build/outputs/apk/debug/${{ env.APK_NAME }}
          prerelease: true
          make_latest: true
