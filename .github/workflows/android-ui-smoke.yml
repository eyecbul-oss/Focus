name: Android UI Smoke Screenshots

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-ui-smoke.yml'

jobs:
  ui-smoke:
    name: Build and Capture UI Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build APK
        working-directory: android
        run: gradle clean assembleDebug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator and capture screens
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell monkey -p com.sezr.focuspro.nativeapp 1
            sleep 4
            mkdir -p ui-smoke-output
            adb shell screencap -p /sdcard/01-pano.png
            adb pull /sdcard/01-pano.png ui-smoke-output/01-pano.png
            adb shell input tap 210 2140
            sleep 1
            adb shell screencap -p /sdcard/02-odak.png
            adb pull /sdcard/02-odak.png ui-smoke-output/02-odak.png
            adb shell input tap 430 2140
            sleep 1
            adb shell screencap -p /sdcard/03-gorev.png
            adb pull /sdcard/03-gorev.png ui-smoke-output/03-gorev.png
            adb shell input tap 650 2140
            sleep 1
            adb shell screencap -p /sdcard/04-rapor.png
            adb pull /sdcard/04-rapor.png ui-smoke-output/04-rapor.png
            adb shell input tap 880 2140
            sleep 1
            adb shell screencap -p /sdcard/05-ai.png
            adb pull /sdcard/05-ai.png ui-smoke-output/05-ai.png
            adb logcat -d > ui-smoke-output/logcat.txt

      - name: Upload UI smoke screenshots
        uses: actions/upload-artifact@v4
        with:
          name: SezR-Focus-Pro-ui-smoke-screenshots
          path: ui-smoke-output
