import org.gradle.api.tasks.compile.JavaCompile

// Makes the top home AI suggestion button perform a real action.
tasks.register('patchAiSuggestButton') {
    doLast {
        File file = file('app/src/main/java/com/sezr/focuspro/MainActivity.java')
        if (!file.exists()) return
        String text = file.getText('UTF-8').replace('\r\n', '\n')

        String oldLine = '        ai.setOnClickListener(v -> show(4));'
        String newBlock = '''        ai.setOnClickListener(v -> {
            if (tasks.isEmpty()) {
                addAiPlanTasks();
                save();
                show(0);
                simpleDialog("AI Plan Hazır", "Bugünün çalışma planı görevlerine eklendi. İlk görevi seçip 25 dakikalık seansla başlayabilirsin.", "Tamam", GREEN).show();
            } else {
                show(4);
            }
        });'''

        if (text.contains(oldLine)) {
            text = text.replace(oldLine, newBlock)
        }

        if (!text.contains('AI Plan Hazır')) {
            throw new GradleException('AI suggest button patch was not applied')
        }

        file.setText(text, 'UTF-8')
    }
}

project(':app') {
    tasks.matching { task -> task.name == 'preBuild' || task.name.endsWith('JavaWithJavac') }.configureEach {
        dependsOn rootProject.tasks.named('patchAiSuggestButton')
    }
}

tasks.withType(JavaCompile).configureEach {
    dependsOn tasks.named('patchAiSuggestButton')
}
