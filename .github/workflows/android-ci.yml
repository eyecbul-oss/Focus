name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  APP_VERSION: 2.2.0
  APK_NAME: SezR-Focus-2.2.0-debug.apk

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${APK_NAME}

      - name: Publish APK file
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sezr-focus-apk
          name: SezR Focus APK ${{ env.APP_VERSION }}
          files: android/app/build/outputs/apk/debug/${{ env.APK_NAME }}
          prerelease: true
          make_latest: true
